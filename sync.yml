name: Sync HR static pages

on:
  workflow_dispatch:   # manual trigger only

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch static pages from local server
        run: |
          curl -s --max-time 30 "http://rajangport.ddns.net:8080/Mantis/HR/tender_static.php" > tender.html
          curl -s --max-time 30 "http://rajangport.ddns.net:8080/Mantis/HR/vacancy_static.php" > vacancy.html
          echo "<!-- Last sync: $(date -u) -->" >> tender.html
          echo "<!-- Last sync: $(date -u) -->" >> vacancy.html

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tender.html vacancy.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Manual sync at $(date -u)"
            git push
          fi
